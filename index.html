<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulario de contacto</title>

    <link rel="stylesheet" href="css/styles.css">
</head>


<body>

<header class="header">
    <h1 class="header__titulo">Formulario de contacto</h1>
    <p class="header__descripcion">
        Completa tus datos y nos comunicaremos contigo.
    </p>
</header>


<main class="contenedor">

    <form class="formulario">

        <fieldset class="formulario__grupo">

            <legend class="formulario__titulo">
                Datos personales
            </legend>


            <label for="nombre">
                Nombre completo
            </label>

            <input 
                    class="formulario__input"
                    type="text"
                    id="nombre"
                    name="nombre"
                    minlength="3"
                    maxlength="30"
                    pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ ]+"
                    aria-required="true"
                    required>

            <input 
                class="formulario__input"
                type="text"
                id="nombre"
                name="nombre"
                placeholder="Ingrese su nombre"
                required>


            <label class="formulario__label" for="email">
                Correo electrónico
            </label>

            <input
                class="formulario__input"
                type="email"
                id="email"
                name="email"
                pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                aria-required="true"
                required>


            <label class="formulario__label" for="telefono">
                Teléfono
            </label>

            <input 
                class="formulario__input"
                type="tel"
                id="telefono"
                name="telefono"
                placeholder="Ingrese su teléfono">

        </fieldset>



        <fieldset class="formulario__grupo">

            <legend class="formulario__titulo">
                Consulta
            </legend>


            <label class="formulario__label" for="categoria">
                Motivo de contacto
            </label>

            <select 
                class="formulario__input"
                id="categoria"
                name="categoria">

                <option value="">
                    Seleccionar
                </option>

                <option value="consulta">
                    Consulta general
                </option>

                <option value="soporte">
                    Soporte técnico
                </option>

                <option value="otro">
                    Otro
                </option>

            </select>


            <label class="formulario__label" for="mensaje">
                Mensaje
            </label>

            <textarea
                class="formulario__input"
                id="mensaje"
                name="mensaje"
                minlength="10"
                maxlength="300"
                aria-required="true"
                required>
            </textarea>


        </fieldset>


        <div class="formulario__terminos">

            <input 
                type="checkbox"
                id="acepto"
                required>

            <label for="acepto">
                Acepto los términos y condiciones
            </label>

        </div>



        <button 
            class="formulario__boton"
            type="submit">

            Enviar formulario

        </button>


    </form>


</main>


<footer class="footer">

    <p>
        Proyecto realizado con HTML y CSS
    </p>

</footer>

<script src="js/validation.js"></script>
</body>

</html>
