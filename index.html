<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de contacto</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header class="header">
    <h1>Formulario de contacto</h1>
    <p>Completá tus datos para comunicarte con nosotros.</p>
</header>

<main class="container">

    <form class="formulario" id="formulario">

    <fieldset>
        <legend>Datos personales</legend>

        <div class="formulario__campo">
            <label for="nombre">Nombre completo</label>

            <input 
            type="text"
            id="nombre"
            name="nombre"
            aria-describedby="errorNombre">

            <small id="errorNombre"></small>
        </div>


        <div class="formulario__campo">

            <label for="email">
                Correo electrónico
            </label>

            <input 
            type="email"
            id="email"
            name="email"
            aria-describedby="errorEmail">

            <small id="errorEmail"></small>

        </div>

    </fieldset>


    <fieldset>

        <legend>Mensaje</legend>

        <label for="mensaje">
            Escriba su consulta
        </label>

        <textarea
        id="mensaje"
        name="mensaje"
        aria-describedby="errorMensaje">
        </textarea>

        <small id="errorMensaje"></small>

    </fieldset>


    <button type="submit">
        Enviar
    </button>

</form>

</main>
<script src="js/validation.js"></script>
</body>
</html>
